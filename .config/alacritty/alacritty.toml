live_config_reload = true

[env]
TERM = "xterm-256color"

[font]
size = 28

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[mouse]
hide_when_typing = true

[scrolling]
history = 50000
multiplier = 20

[window]
decorations = "buttonless"
dynamic_padding = false
opacity = 0.9
startup_mode = "Maximized"

[window.padding]
x = 5
y = 0
