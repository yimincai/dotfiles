live_config_reload: true

tabspaces: 4
env:
  TERM: xterm-256color
window:
  opacity: 1

  padding:
    x: 5
    y: 0

  dynamic_padding: false
  startup_mode: Maximized
  decorations: buttonless

scrolling:
  history: 50000
  multiplier: 20

font:
  normal:
    family: 'JetBrainsMono Nerd Font Mono'
    style: Regular
  size: 13

mouse:
  double_click:
    threshold: 300
  hide_when_typing: true
